<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>拉伸Tap</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        html,
        body {
            height: 100%;
            overflow: hidden;
            background: #4F3826;
            font-family: "PingFang SC", "Microsoft YaHei", system-ui, sans-serif;
            touch-action: none;
            user-select: none;
            -webkit-user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        #stage {
            position: fixed;
            inset: 0;
            background: #4F3826;
            overflow: hidden;
            isolation: isolate;
        }

        /* ---- 画布 ---- */
        #fx {
            position: absolute;
            inset: 0;
            z-index: 2;
            pointer-events: none;
        }

        /* ---- 网格（完全透明，仅用于布局和触发） ---- */
        #grid {
            position: absolute;
            inset: 0;
            z-index: 1;
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            grid-template-rows: repeat(6, 1fr);
            gap: 2px;
            padding: 2px;
            pointer-events: none;
        }
        .cell {
            background: transparent !important;
            box-shadow: none !important;
            border-radius: 4px;
            transition: background 0.08s ease, box-shadow 0.08s ease, transform 0.08s ease;
            pointer-events: none;
            position: relative;
        }
        .cell.hit {
            background: rgba(255, 210, 120, 0.35) !important;
            box-shadow: 0 0 20px rgba(255, 200, 100, 0.25) !important;
            transform: scale(0.96);
        }
        .cell .label {
            display: none;
        }

        /* ---- 标题 ---- */
        #title {
            position: absolute;
            top: max(18px, env(safe-area-inset-top));
            left: 50%;
            transform: translateX(-50%);
            z-index: 10;
            color: rgba(255, 210, 160, 0.6);
            font-size: clamp(18px, 4.2vw, 36px);
            font-weight: 900;
            letter-spacing: 0.3em;
            text-shadow: 0 4px 20px rgba(0, 0, 0, 0.5);
            pointer-events: none;
            white-space: nowrap;
        }
        #title span {
            color: rgba(255, 220, 180, 0.85);
        }

        /* ---- 提示 ---- */
        #hint {
            position: absolute;
            bottom: max(16px, env(safe-area-inset-bottom) + 8px);
            left: 50%;
            transform: translateX(-50%);
            z-index: 10;
            color: rgba(255, 200, 150, 0.2);
            font-size: 12px;
            letter-spacing: 0.15em;
            pointer-events: none;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.4);
            white-space: nowrap;
            transition: opacity 0.8s ease;
        }

        /* ---- 遮罩（含灵感来源和音量控制） ---- */
        #overlay {
            position: absolute;
            inset: 0;
            z-index: 20;
            display: flex;
            flex-direction: column;
            gap: 14px;
            align-items: center;
            justify-content: center;
            background: rgba(79, 56, 38, 0.88);
            backdrop-filter: blur(4px);
            padding: 20px;
            cursor: default;
            transition: opacity 0.5s ease;
        }
        #overlay .big {
            font-size: clamp(42px, 10vw, 82px);
            font-weight: 900;
            letter-spacing: 0.2em;
            color: rgba(255, 220, 180, 0.85);
            text-shadow: 0 6px 30px rgba(0, 0, 0, 0.5);
            cursor: pointer;
            padding: 8px 20px;
            border-radius: 12px;
            transition: background 0.2s;
        }
        #overlay .big:hover {
            background: rgba(255, 200, 150, 0.06);
        }
        #overlay .big em {
            font-style: normal;
            color: rgba(255, 200, 140, 0.4);
        }
        #overlay .sub {
            font-size: clamp(13px, 2.2vmin, 18px);
            letter-spacing: 0.4em;
            color: rgba(255, 200, 150, 0.4);
            animation: pulseHint 1.8s ease-in-out infinite;
            margin-top: -6px;
            cursor: pointer;
            min-height: 2.2em;
        }
        @keyframes pulseHint {
            0%,
            100% {
                opacity: 0.3;
            }
            50% {
                opacity: 0.7;
            }
        }

        /* 灵感来源链接 */
        .inspire-links {
            display: flex;
            gap: 18px;
            margin: 4px 0 6px;
            flex-wrap: wrap;
            justify-content: center;
        }
        .inspire-links a {
            color: rgba(255, 200, 150, 0.5);
            font-size: 13px;
            letter-spacing: 0.06em;
            text-decoration: none;
            border-bottom: 1px solid rgba(255, 200, 150, 0.15);
            padding-bottom: 2px;
            transition: color 0.25s, border-color 0.25s;
            cursor: pointer;
            pointer-events: auto;
        }
        .inspire-links a:hover {
            color: rgba(255, 220, 180, 0.85);
            border-color: rgba(255, 200, 150, 0.4);
        }

        /* 底部链接（在遮罩内） */
        .overlay-bottom-links {
            display: flex;
            gap: 16px;
            align-items: center;
            margin-top: 2px;
        }
        .overlay-bottom-links a {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 30px;
            height: 30px;
            color: rgba(255, 210, 160, 0.5);
            transition: color 0.25s, transform 0.2s;
            cursor: pointer;
            pointer-events: auto;
        }
        .overlay-bottom-links a:hover {
            color: rgba(255, 220, 180, 0.85);
            transform: scale(1.12);
        }
        .overlay-bottom-links svg {
            width: 24px;
            height: 24px;
            fill: currentColor;
            stroke: none;
        }

        /* 音量控制 */
        .volume-control {
            display: flex;
            align-items: center;
            gap: 14px;
            background: rgba(255, 200, 150, 0.08);
            padding: 10px 18px;
            border-radius: 30px;
            backdrop-filter: blur(2px);
            cursor: default;
            pointer-events: auto;
            border: 1px solid rgba(255, 200, 150, 0.10);
            transition: opacity 0.3s ease;
        }
        .volume-control.disabled {
            pointer-events: none;
            opacity: 0.35;
        }
        .volume-control label {
            color: rgba(255, 210, 160, 0.6);
            font-size: 13px;
            font-weight: 500;
            letter-spacing: 0.06em;
            white-space: nowrap;
        }
        .volume-control input[type="range"] {
            width: 140px;
            height: 4px;
            -webkit-appearance: none;
            appearance: none;
            background: rgba(255, 200, 150, 0.2);
            border-radius: 2px;
            outline: none;
            transition: background 0.2s;
        }
        .volume-control input[type="range"]:disabled {
            opacity: 0.5;
        }
        .volume-control input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 16px;
            height: 16px;
            border-radius: 50%;
            background: rgba(255, 210, 160, 0.7);
            cursor: pointer;
            transition: background 0.2s;
        }
        .volume-control input[type="range"]::-webkit-slider-thumb:hover {
            background: rgba(255, 210, 160, 0.9);
        }
        .volume-control input[type="range"]:disabled::-webkit-slider-thumb {
            cursor: not-allowed;
            background: rgba(255, 210, 160, 0.3);
        }
        .volume-control input[type="range"]::-moz-range-thumb {
            width: 16px;
            height: 16px;
            border-radius: 50%;
            border: none;
            background: rgba(255, 210, 160, 0.7);
            cursor: pointer;
        }
        .volume-control input[type="range"]:disabled::-moz-range-thumb {
            cursor: not-allowed;
            background: rgba(255, 210, 160, 0.3);
        }
        .volume-control .vol-value {
            color: rgba(255, 210, 160, 0.5);
            font-size: 13px;
            font-weight: 600;
            min-width: 32px;
            text-align: center;
        }

        /* ---- 响应式 ---- */
        @media (max-width: 480px) {
            #title {
                font-size: clamp(14px, 5vw, 22px);
                letter-spacing: 0.2em;
            }
            #hint {
                font-size: 10px;
            }
            .volume-control input[type="range"] {
                width: 100px;
            }
            .volume-control label {
                font-size: 11px;
            }
            .volume-control .vol-value {
                font-size: 11px;
                min-width: 26px;
            }
            .inspire-links a {
                font-size: 11px;
            }
            .overlay-bottom-links a {
                width: 26px;
                height: 26px;
            }
            .overlay-bottom-links svg {
                width: 20px;
                height: 20px;
            }
        }
        @media (max-height: 600px) {
            .inspire-links {
                gap: 12px;
            }
            .volume-control {
                padding: 6px 12px;
            }
        }
    </style>
</head>
<body>

    <div id="stage">
        <canvas id="fx"></canvas>

        <div id="grid" role="grid" aria-label="四列音效网格"></div>

        <div id="title">拉伸<span>Tap</span></div>
        <div id="hint">点击 · 滑动 · 升调</div>

        <!-- 遮罩 -->
        <div id="overlay">
            <div class="big" id="start-trigger">拉伸<em>Tap</em></div>
            <div class="sub" id="start-hint">按 Alt + F4 开 始</div>

            <div class="inspire-links">
                <a href="https://aidn.jp/mikutap/" target="_blank" rel="noopener noreferrer">Mikutap</a>
                <a href="https://www.bilibili.com/toy/Dagou-Tap/index.html" target="_blank" rel="noopener noreferrer">大狗Tap</a>
            </div>

            <div class="volume-control" id="volume-control">
                <label for="bgm-volume">背景音量</label>
                <input type="range" id="bgm-volume" min="0" max="1" step="0.01" value="0.25" />
                <span class="vol-value" id="vol-value">25%</span>
            </div>

            <div class="overlay-bottom-links">
                <a href="https://github.com/CraftSoul/kards-image-tool" target="_blank"><img src="https://cdn.jsdelivr.net/gh/simple-icons/simple-icons/icons/github.svg" alt="github"> GitHub</a>
                <a href="https://space.bilibili.com/3546775476505152" target="_blank"><img src="https://cdn.jsdelivr.net/gh/simple-icons/simple-icons/icons/bilibili.svg" alt="bili"> BiliBili</a>
            </div>
        </div>
    </div>

    <script>
        /* ============================================================
         *  拉伸Tap —— 四列音效 (boom, sla, sl, a)
         *  行数6 · 音调反向 · 点击修复 · 量化播放
         *  音量：boom减半，a加倍
         *  遮罩含灵感来源和底部链接
         * ============================================================ */

        // ---------- 常量 ----------
        const BPM = 128;
        const SPB = 60 / BPM;
        const S16 = SPB / 4;
        const S8 = SPB / 2;
        const MASTER_GAIN = 0.72;
        const INPUT_LOOKAHEAD = 0.12;
        const INPUT_QUEUE_LOOKAHEAD = 0.03;

        const COLS = 4;
        const ROWS = 6; // 减少2行
        // 轨道顺序：boom, sla, sl, a
        const SAMPLE_NAMES = ['boom', 'sla', 'sl', 'a'];
        const SAMPLE_FILES = ['boom.wav', 'sla.wav', 'sl.wav', 'a.wav'];

        // ---------- 全局状态 ----------
        let ctx = null;
        let master = null;
        let bgmBus = null;
        let sfxBus = null;
        let noiseBuf = null;
        let started = false;
        let startTime = 0;
        let nextNoteTime = 0;
        let stepCount = 0;

        let bgmVolume = 0.25;

        const buffers = {};
        let loadedCount = 0;
        let loadComplete = false;

        const inputQueue = [];
        let inputSerial = 0;
        let lastCommittedInputTime = -Infinity;
        const pointers = new Map();

        let fxCanvas, fxCtx, fxW, fxH;
        let fxList = [];
        let beatP = 0;
        let lastTick = 0;

        let gridEl;
        let cells = [];

        // ---------- 和弦走向 ----------
        const CHORDS = [
            { bass: 65.41, notes: [261.63, 329.63, 392.00, 523.25] },
            { bass: 49.00, notes: [196.00, 246.94, 293.66, 392.00] },
            { bass: 55.00, notes: [220.00, 261.63, 329.63, 440.00] },
            { bass: 43.65, notes: [174.61, 220.00, 261.63, 349.23] },
        ];
        const HAT_VEL = [0.34, 0.16, 0.42, 0.16];

        // ---------- 调色板 ----------
        const COLORS = {
            bg: '#4F3826',
            amber: '#f0b060',
            gray: '#a09080',
            coral: '#f06a5a',
            teal: '#4ab8a0',
            blue: '#5a8af0',
        };
        const ACCENTS = [COLORS.coral, COLORS.teal, COLORS.blue];

        function pickColor(rng) {
            const r = rng();
            if (r < 0.6) return COLORS.amber;
            if (r < 0.85) return COLORS.gray;
            return ACCENTS[(rng() * ACCENTS.length) | 0];
        }

        // ---------- 随机数 ----------
        function mulberry32(a) {
            return function() {
                a |= 0;
                a = a + 0x6D2B79F5 | 0;
                let t = Math.imul(a ^ a >>> 15, 1 | a);
                t = t + Math.imul(t ^ t >>> 7, 61 | t) ^ t;
                return ((t ^ t >>> 14) >>> 0) / 4294967296;
            };
        }

        // ---------- 工具 ----------
        const clamp01 = v => v < 0 ? 0 : v > 1 ? 1 : v;
        const smooth = t => t * t * (3 - 2 * t);
        const easeOutCubic = t => 1 - Math.pow(1 - t, 3);
        const easeOutBack = t => { const c = 1.70158,
                u = t - 1; return 1 + (c + 1) * u * u * u + c * u * u; };
        const easeOutElastic = t =>
            t <= 0 ? 0 : t >= 1 ? 1 : Math.pow(2, -10 * t) * Math.sin((t * 10 - 0.75) * (2 * Math.PI / 3)) + 1;

        function nowSec() { return ctx ? ctx.currentTime : performance.now() / 1000; }

        // ---------- 音频初始化 ----------
        function initAudio() {
            ctx = new(window.AudioContext || window.webkitAudioContext)();
            master = ctx.createGain();
            master.gain.value = MASTER_GAIN;
            bgmBus = ctx.createGain();
            bgmBus.gain.value = bgmVolume;
            sfxBus = ctx.createGain();
            sfxBus.gain.value = 1;

            const comp = ctx.createDynamicsCompressor();
            comp.threshold.value = -14;
            comp.knee.value = 24;
            comp.ratio.value = 5;
            comp.attack.value = 0.004;
            comp.release.value = 0.18;

            bgmBus.connect(master);
            sfxBus.connect(master);
            master.connect(comp);
            comp.connect(ctx.destination);

            noiseBuf = ctx.createBuffer(1, ctx.sampleRate, ctx.sampleRate);
            const d = noiseBuf.getChannelData(0);
            for (let i = 0; i < d.length; i++) d[i] = Math.random() * 2 - 1;
        }

        // ---------- 加载音效 ----------
        function loadSamples() {
            const promises = SAMPLE_FILES.map((file, i) => {
                return fetch(file)
                    .then(res => {
                        if (!res.ok) throw new Error(`无法加载 ${file}`);
                        return res.arrayBuffer();
                    })
                    .then(buf => ctx.decodeAudioData(buf))
                    .then(audioBuf => {
                        buffers[SAMPLE_NAMES[i]] = audioBuf;
                        loadedCount++;
                        if (loadedCount === SAMPLE_NAMES.length) {
                            loadComplete = true;
                            console.log('所有音效加载完成');
                        }
                    })
                    .catch(err => {
                        console.warn(`加载 ${file} 失败，使用合成音色替代`, err);
                        const len = ctx.sampleRate * 0.4;
                        const buf = ctx.createBuffer(1, len, ctx.sampleRate);
                        const data = buf.getChannelData(0);
                        for (let j = 0; j < len; j++) {
                            data[j] = Math.sin(j / ctx.sampleRate * 440 * 2 * Math.PI * (1 + 0.1 * (i + 1))) *
                                0.3 * Math.exp(-j / len * 4);
                        }
                        buffers[SAMPLE_NAMES[i]] = buf;
                        loadedCount++;
                        if (loadedCount === SAMPLE_NAMES.length) {
                            loadComplete = true;
                            console.log('所有音效就绪（部分合成）');
                        }
                    });
            });
            return Promise.all(promises);
        }

        // ---------- 背景音乐合成 ----------
        function kick(t) {
            const o = ctx.createOscillator();
            const g = ctx.createGain();
            o.type = 'sine';
            o.frequency.setValueAtTime(160, t);
            o.frequency.exponentialRampToValueAtTime(45, t + 0.11);
            g.gain.setValueAtTime(0.85, t);
            g.gain.exponentialRampToValueAtTime(0.001, t + 0.24);
            o.connect(g);
            g.connect(bgmBus);
            o.start(t);
            o.stop(t + 0.26);
        }

        function snare(t, vol = 0.5) {
            const n = ctx.createBufferSource();
            n.buffer = noiseBuf;
            const f = ctx.createBiquadFilter();
            f.type = 'bandpass';
            f.frequency.value = 1800;
            f.Q.value = 0.9;
            const g = ctx.createGain();
            g.gain.setValueAtTime(vol, t);
            g.gain.exponentialRampToValueAtTime(0.001, t + 0.16);
            n.connect(f);
            f.connect(g);
            g.connect(bgmBus);
            n.start(t);
            n.stop(t + 0.18);
            const o = ctx.createOscillator();
            o.type = 'triangle';
            o.frequency.setValueAtTime(240, t);
            const g2 = ctx.createGain();
            g2.gain.setValueAtTime(vol * 0.5, t);
            g2.gain.exponentialRampToValueAtTime(0.001, t + 0.09);
            o.connect(g2);
            g2.connect(bgmBus);
            o.start(t);
            o.stop(t + 0.1);
        }

        function hat(t, vol, decay) {
            const n = ctx.createBufferSource();
            n.buffer = noiseBuf;
            const f = ctx.createBiquadFilter();
            f.type = 'highpass';
            f.frequency.value = 7500;
            const g = ctx.createGain();
            g.gain.setValueAtTime(vol, t);
            g.gain.exponentialRampToValueAtTime(0.001, t + decay);
            n.connect(f);
            f.connect(g);
            g.connect(bgmBus);
            n.start(t);
            n.stop(t + decay + 0.02);
        }

        function crash(t) {
            const n = ctx.createBufferSource();
            n.buffer = noiseBuf;
            const f = ctx.createBiquadFilter();
            f.type = 'highpass';
            f.frequency.value = 5000;
            const g = ctx.createGain();
            g.gain.setValueAtTime(0.28, t);
            g.gain.exponentialRampToValueAtTime(0.001, t + 1.2);
            n.connect(f);
            f.connect(g);
            g.connect(bgmBus);
            n.start(t);
            n.stop(t + 1.3);
        }

        function stab(t, freqs) {
            const f = ctx.createBiquadFilter();
            f.type = 'lowpass';
            f.frequency.setValueAtTime(2600, t);
            f.frequency.exponentialRampToValueAtTime(600, t + 0.28);
            const g = ctx.createGain();
            g.gain.setValueAtTime(0.0001, t);
            g.gain.exponentialRampToValueAtTime(0.12, t + 0.01);
            g.gain.exponentialRampToValueAtTime(0.001, t + 0.28);
            f.connect(g);
            g.connect(bgmBus);
            for (const fr of freqs) {
                for (const det of [-6, 5]) {
                    const o = ctx.createOscillator();
                    o.type = 'sawtooth';
                    o.frequency.value = fr;
                    o.detune.value = det;
                    o.connect(f);
                    o.start(t);
                    o.stop(t + 0.3);
                }
            }
        }

        function bass(t, fr, vol) {
            const o = ctx.createOscillator();
            o.type = 'square';
            o.frequency.value = fr * 2;
            const f = ctx.createBiquadFilter();
            f.type = 'lowpass';
            f.frequency.value = 300;
            const g = ctx.createGain();
            g.gain.setValueAtTime(0.0001, t);
            g.gain.exponentialRampToValueAtTime(vol, t + 0.01);
            g.gain.exponentialRampToValueAtTime(0.001, t + S8 * 0.9);
            o.connect(f);
            f.connect(g);
            g.connect(bgmBus);
            o.start(t);
            o.stop(t + S8);
        }

        function scheduleStep(s, t) {
            const bar = (s / 16) | 0;
            const pos = s % 16;
            const ch = CHORDS[bar];
            if (bar === 0 && pos === 0) crash(t);
            if (pos % 4 === 0) kick(t);
            if (pos === 4 || pos === 12) snare(t);
            if (bar === 3 && pos === 14) snare(t, 0.3);
            hat(t, HAT_VEL[pos % 4], pos === 14 ? 0.12 : 0.04);
            if (pos % 4 === 2) stab(t, ch.notes);
            if (pos % 2 === 0) bass(t, ch.bass, pos % 4 === 0 ? 0.4 : 0.26);
        }

        function scheduler() {
            if (!ctx) return;
            const horizon = ctx.currentTime + INPUT_LOOKAHEAD;
            while (nextNoteTime < horizon) {
                scheduleStep(stepCount, nextNoteTime);
                nextNoteTime += S16;
                stepCount = (stepCount + 1) % 64;
            }
            scheduleQueuedInputs(ctx.currentTime + INPUT_QUEUE_LOOKAHEAD);
        }

        // ---------- 量化 ----------
        function quantize(unit) {
            const now = ctx.currentTime;
            const k = Math.ceil((now + 0.02 - startTime) / unit);
            let t = startTime + k * unit;
            if (t < now) t += unit;
            return t;
        }

        // ---------- 播放音效 ----------
        function playSample(sampleName, pitchTier, when) {
            const buffer = buffers[sampleName];
            if (!buffer) return;
            const rate = 1 + ((ROWS - 1 - pitchTier) / (ROWS - 1));
            const source = ctx.createBufferSource();
            source.buffer = buffer;
            source.playbackRate.setValueAtTime(rate, when);
            const gain = ctx.createGain();
            let volFactor = 1.0;
            if (sampleName === 'boom') volFactor = 0.5;
            else if (sampleName === 'a') volFactor = 2.0;
            const baseGain = 0.9 * volFactor;
            gain.gain.setValueAtTime(baseGain, when);
            gain.gain.exponentialRampToValueAtTime(0.001, when + 0.4);
            source.connect(gain);
            gain.connect(sfxBus);
            source.start(when);
            source.stop(when + 0.5);
        }

        // ---------- 输入队列 ----------
        function enqueueActivation(col, row, pointerId) {
            const sample = SAMPLE_NAMES[col];
            const entry = {
                id: ++inputSerial,
                pointerId,
                col,
                row,
                sample,
                when: 0,
            };
            inputQueue.push(entry);
            reflowQueuedInputTimes();
            flashCell(col, row);
            return entry;
        }

        function reflowQueuedInputTimes() {
            let when = quantize(S8);
            if (Number.isFinite(lastCommittedInputTime)) {
                when = Math.max(when, lastCommittedInputTime + S8);
            }
            for (const entry of inputQueue) {
                entry.when = when;
                when += S8;
            }
        }

        function scheduleQueuedInputs(horizon) {
            while (inputQueue.length && inputQueue[0].when < horizon) {
                const entry = inputQueue.shift();
                lastCommittedInputTime = entry.when;
                playSample(entry.sample, entry.row, entry.when);
                spawnEffect(entry.col, entry.row, entry.when);
            }
        }

        function cancelQueuedInputs(pointerId) {
            // 保留队列，不取消（点击修复）
        }

        // ---------- 网格交互 ----------
        function getCellIndex(clientX, clientY) {
            const rect = document.getElementById('stage').getBoundingClientRect();
            const x = clientX - rect.left;
            const y = clientY - rect.top;
            const cellW = rect.width / COLS;
            const cellH = rect.height / ROWS;
            const col = Math.min(COLS - 1, Math.max(0, Math.floor(x / cellW)));
            const row = Math.min(ROWS - 1, Math.max(0, Math.floor(y / cellH)));
            return { col, row };
        }

        function flashCell(col, row) {
            const idx = row * COLS + col;
            const el = cells[idx];
            if (el) {
                el.classList.remove('hit');
                void el.offsetWidth;
                el.classList.add('hit');
                setTimeout(() => el.classList.remove('hit'), 200);
            }
        }

        function tryActivate(pointerId, clientX, clientY) {
            const { col, row } = getCellIndex(clientX, clientY);
            const state = pointers.get(pointerId);
            if (state && state.col === col && state.row === row) return;
            const entry = enqueueActivation(col, row, pointerId);
            pointers.set(pointerId, { col, row, pendingId: entry.id });
        }

        // ---------- 全屏特效 (仿大狗Tap) ----------
        const EFFECTS = [
            'rings', 'poly', 'spiral', 'rays', 'confetti', 'zigzag',
            'pop', 'cross', 'orbit', 'wave', 'stars', 'grid'
        ];

        function buildEffect(type) {
            const rng = mulberry32((Math.random() * 1e9) | 0);
            const inst = { type, cx: fxW / 2, cy: fxH / 2, t0: 0, state: 'in', outT0: 0, rot0: rng() * Math.PI * 2,
                dir: rng() < 0.5 ? -1 : 1, shapes: [] };
            const BUILD = {
                rings(i, r) {
                    const minD = Math.min(fxW, fxH);
                    for (let j = 0; j < 7; j++) i.shapes.push({ delay: j * 0.05, rEnd: minD * (0.13 + r() * 0.29),
                        w: 5 + r() * 9, color: pickColor(r) });
                    i.dotR = minD * 0.07;
                },
                poly(i, r) {
                    const sides = 3 + (r() * 5 | 0);
                    const minD = Math.min(fxW, fxH);
                    [
                        [0.46, COLORS.amber, 0],
                        [0.3, COLORS.gray, 0.09],
                        [0.17, COLORS.amber, 0.18]
                    ].forEach(([s, c, d]) => i.shapes.push({ sides, delay: d, color: c, rEnd: minD * s, w: minD * (0.034 -
                            0.007 * d / 0.09) }));
                },
                spiral(i, r) {
                    const minD = Math.min(fxW, fxH);
                    for (let j = 0; j < 36; j++) i.shapes.push({ ang: j * 0.55, rad: 6 + j * minD * 0.0125,
                        size: minD * (0.009 + j * 0.0008), delay: j * 0.018, color: pickColor(r) });
                },
                rays(i, r) {
                    const minD = Math.min(fxW, fxH);
                    const n = 13 + (r() * 4 | 0);
                    i.r0 = minD * 0.06;
                    for (let j = 0; j < n; j++) i.shapes.push({ ang: (j / n) * 2 * Math.PI + r() * 0.15, w: 0.09 + r() *
                            0.13, len: minD * (0.36 + r() * 0.1), delay: r() * 0.12, color: r() < 0.12 ? ACCENTS[(r() *
                            3) | 0] : (j % 2 ? COLORS.gray : COLORS.amber) });
                },
                confetti(i, r) {
                    const maxD = Math.hypot(fxW, fxH);
                    const minD = Math.min(fxW, fxH);
                    const kinds = ['square', 'circle', 'triangle', 'diamond'];
                    for (let j = 0; j < 30; j++) i.shapes.push({ ang: r() * 2 * Math.PI, dist: maxD * (0.12 + r() *
                            0.46), size: minD * (0.026 + r() * 0.05), spin: i.dir * (1 + r() * 2) * 2.2, delay: r() *
                            0.18, kind: kinds[(r() * 4) | 0], color: pickColor(r) });
                },
                zigzag(i, r) {
                    const minD = Math.min(fxW, fxH);
                    const horiz = r() < 0.5;
                    const n = 5 + (r() * 3 | 0);
                    const pts = [];
                    for (let j = 0; j <= n; j++) {
                        const f = j / n;
                        if (horiz) pts.push({ x: -fxW * 0.08 + f * fxW * 1.16, y: fxH * (j % 2 ? 0.72 + r() * 0.14 : 0.14 +
                                r() * 0.14) });
                        else pts.push({ x: fxW * (j % 2 ? 0.7 + r() * 0.16 : 0.14 + r() * 0.16), y: -fxH * 0.08 + f * fxH *
                                1.16 });
                    }
                    const lens = [];
                    let total = 0;
                    for (let j = 1; j < pts.length; j++) {
                        const l = Math.hypot(pts[j].x - pts[j - 1].x, pts[j].y - pts[j - 1].y);
                        lens.push(l);
                        total += l;
                    }
                    i.shapes.push({ pts, lens, total, w: minD * (0.026 + r() * 0.024), color: COLORS.amber });
                },
                pop(i, r) {
                    const minD = Math.min(fxW, fxH);
                    const kinds = ['circle', 'square', 'ring', 'triangle', 'hexagon'];
                    for (let j = 0; j < 16; j++) i.shapes.push({ x: fxW * (0.06 + r() * 0.88), y: fxH * (0.06 + r() *
                            0.88), size: minD * (0.036 + r() * 0.06), delay: r() * 0.28, rot: r() * Math.PI, kind: kinds[(
                            r() * kinds.length) | 0], color: pickColor(r) });
                },
                cross(i, r) {
                    const minD = Math.min(fxW, fxH);
                    const size = minD * (0.6 + r() * 0.25);
                    i.shapes.push({ size, w: size * (0.14 + r() * 0.08), color: r() < 0.2 ? ACCENTS[(r() * 3) | 0] :
                            COLORS.amber });
                },
                orbit(i, r) {
                    const minD = Math.min(fxW, fxH);
                    const kinds = ['circle', 'square', 'triangle', 'ring'];
                    const n = 10;
                    for (let j = 0; j < n; j++) i.shapes.push({ ang0: (j / n) * 2 * Math.PI, rad: minD * (0.18 + r() *
                            0.24), speed: i.dir * (0.45 + r() * 0.5), size: minD * (0.026 + r() * 0.032), delay: r() *
                            0.15, kind: kinds[j % 4], color: pickColor(r) });
                    i.coreR = minD * 0.055;
                },
                wave(i, r) {
                    const minD = Math.min(fxW, fxH);
                    for (let j = 0; j < 4; j++) i.shapes.push({ y0: fxH * (0.14 + j * 0.24) + (r() - 0.5) * fxH * 0.08,
                        amp: minD * (0.03 + r() * 0.05), wl: fxW * (0.45 + r() * 0.4), speed: i.dir * (1 + r() *
                        1.2), th: minD * (0.07 + r() * 0.06), side: j % 2 ? 1 : -1, delay: j * 0.08, color: r() <
                            0.12 ? ACCENTS[(r() * 3) | 0] : (j % 2 ? COLORS.gray : COLORS.amber) });
                },
                stars(i, r) {
                    const minD = Math.min(fxW, fxH);
                    for (let j = 0; j < 12; j++) i.shapes.push({ x: fxW * (0.07 + r() * 0.86), y: fxH * (0.07 + r() *
                            0.86), r: minD * (0.034 + r() * 0.055), delay: r() * 0.25, rot: r() * Math.PI, color: pickColor(
                            r) });
                },
                grid(i, r) {
                    const minD = Math.min(fxW, fxH);
                    const n = 11;
                    const radius = minD * (0.4 + r() * 0.04);
                    const lines = [];
                    for (let j = 0; j < n; j++) lines.push({ y: (j - (n - 1) / 2) * (radius * 2 / n), w: 4.5 + ((j * 7) %
                            3) * 4, delay: j * 0.045, color: j % 2 ? COLORS.gray : COLORS.amber });
                    i.shapes.push({ radius, lines });
                },
            };
            BUILD[type](inst, rng);
            return inst;
        }

        const DRAW = {
            rings(g, inst, t, fade) {
                const minD = Math.min(fxW, fxH);
                inst.shapes.forEach((s, i) => {
                    const k = easeOutCubic(Math.min(1, (t - s.delay) / 0.55));
                    if (k <= 0) return;
                    const r = k * s.rEnd * (1 + 0.04 * Math.sin(t * 1.4 + i)) + beatP * minD * 0.012;
                    g.globalAlpha = (1 - k * 0.5) * fade;
                    g.strokeStyle = s.color;
                    g.lineWidth = s.w * (1 + beatP * 0.5);
                    g.beginPath();
                    g.arc(inst.cx, inst.cy, r, 0, 7);
                    g.stroke();
                });
                const dk = easeOutBack(Math.min(1, t / 0.55));
                if (dk > 0) {
                    g.globalAlpha = fade;
                    g.fillStyle = COLORS.amber;
                    g.beginPath();
                    g.arc(inst.cx, inst.cy, inst.dotR * dk * (1 + beatP * 0.2), 0, 7);
                    g.fill();
                }
            },
            poly(g, inst, t, fade) {
                const minD = Math.min(fxW, fxH);
                inst.shapes.forEach((s, i) => {
                    const k = easeOutCubic(Math.min(1, (t - s.delay) / 0.55));
                    if (k <= 0) return;
                    const r = k * s.rEnd * (1 + beatP * 0.035 + 0.03 * Math.sin(t * 1.1 + i * 1.9));
                    const rot = inst.rot0 + inst.dir * (1 - k) * 1.3 + t * 0.18 * inst.dir;
                    g.globalAlpha = (1 - k * 0.3) * fade;
                    g.strokeStyle = s.color;
                    g.lineWidth = s.w * (1 + beatP * 0.4) + beatP * minD * 0.0015;
                    g.beginPath();
                    for (let j = 0; j < s.sides; j++) {
                        const a = rot + (j * 2 * Math.PI) / s.sides;
                        const px = inst.cx + Math.cos(a) * r,
                            py = inst.cy + Math.sin(a) * r;
                        j ? g.lineTo(px, py) : g.moveTo(px, py);
                    }
                    g.closePath();
                    g.stroke();
                });
            },
            spiral(g, inst, t, fade) {
                const rot = inst.rot0 + t * 0.45 * inst.dir + beatP * 0.05 * inst.dir;
                inst.shapes.forEach((s, i) => {
                    const k = easeOutBack(Math.min(1, (t - s.delay) / 0.55));
                    if (k <= 0) return;
                    const a = s.ang + rot;
                    const r = s.rad * k * (1 + beatP * 0.04) + Math.sin(t * 1.5 + i * 0.5) * 4;
                    const x = inst.cx + Math.cos(a) * r;
                    const y = inst.cy + Math.sin(a) * r;
                    const sz = s.size * k * (1 + beatP * 0.25);
                    g.globalAlpha = fade;
                    g.fillStyle = s.color;
                    g.beginPath();
                    g.arc(x, y, sz, 0, 7);
                    g.fill();
                });
            },
            rays(g, inst, t, fade) {
                for (const s of inst.shapes) {
                    const k = easeOutCubic(Math.min(1, (t - s.delay) / 0.5));
                    if (k <= 0) continue;
                    const rot = inst.rot0 + inst.dir * (1 - k) * 0.8 + t * 0.14 * inst.dir;
                    const len = s.len * k * (1 + beatP * 0.09);
                    const a = s.ang + rot;
                    g.globalAlpha = 0.88 * fade;
                    g.fillStyle = s.color;
                    g.beginPath();
                    g.moveTo(inst.cx, inst.cy);
                    g.arc(inst.cx, inst.cy, inst.r0 + len, a - s.w, a + s.w);
                    g.closePath();
                    g.fill();
                }
            },
            confetti(g, inst, t, fade) {
                inst.shapes.forEach((s, i) => {
                    const k = easeOutBack(Math.min(1, (t - s.delay) / 0.55));
                    if (k <= 0) return;
                    const x = inst.cx + Math.cos(s.ang) * s.dist * k * (1 + beatP * 0.025);
                    const y = inst.cy + Math.sin(s.ang) * s.dist * k * (1 + beatP * 0.025) + Math.sin(t * 2.2 + i *
                        1.3) * 6;
                    const sz = s.size * k * (1 + beatP * 0.18);
                    const rot = s.spin * k + t * 0.6 * inst.dir;
                    g.globalAlpha = fade;
                    g.save();
                    g.translate(x, y);
                    g.rotate(rot);
                    g.fillStyle = s.color;
                    const r = sz;
                    switch (s.kind) {
                        case 'circle':
                            g.beginPath();
                            g.arc(0, 0, r, 0, 7);
                            g.fill();
                            break;
                        case 'square':
                            g.fillRect(-r, -r, r * 2, r * 2);
                            break;
                        case 'triangle':
                            g.beginPath();
                            for (let j = 0; j < 3; j++) {
                                const a = -Math.PI / 2 + (j * 2 * Math.PI) / 3;
                                const px = Math.cos(a) * r * 1.2,
                                    py = Math.sin(a) * r * 1.2;
                                j ? g.lineTo(px, py) : g.moveTo(px, py);
                            }
                            g.closePath();
                            g.fill();
                            break;
                        case 'diamond':
                            g.beginPath();
                            for (let j = 0; j < 4; j++) {
                                const a = (j * 2 * Math.PI) / 4 + Math.PI / 4;
                                const px = Math.cos(a) * r * 1.15,
                                    py = Math.sin(a) * r * 1.15;
                                j ? g.lineTo(px, py) : g.moveTo(px, py);
                            }
                            g.closePath();
                            g.fill();
                            break;
                        case 'ring':
                            g.strokeStyle = s.color;
                            g.lineWidth = r * 0.2;
                            g.beginPath();
                            g.arc(0, 0, r, 0, 7);
                            g.stroke();
                            break;
                        default:
                            g.beginPath();
                            g.arc(0, 0, r, 0, 7);
                            g.fill();
                    }
                    g.restore();
                });
            },
            zigzag(g, inst, t, fade) {
                const s = inst.shapes[0];
                const k = easeOutCubic(Math.min(1, t / 0.6));
                if (k <= 0) return;
                g.save();
                g.translate(0, Math.sin(t * 1.6) * 7);
                g.lineJoin = 'round';
                g.lineCap = 'round';
                g.save();
                g.translate(0, s.w * 2.1);
                g.globalAlpha = 0.4 * fade;
                g.strokeStyle = COLORS.gray;
                g.lineWidth = s.w * (1 + beatP * 0.2);
                const pts = s.pts,
                    lens = s.lens,
                    total = s.total;
                g.beginPath();
                g.moveTo(pts[0].x, pts[0].y);
                let acc = 0,
                    vis = k * total;
                for (let i = 1; i < pts.length; i++) {
                    const seg = lens[i - 1];
                    if (acc + seg <= vis) {
                        g.lineTo(pts[i].x, pts[i].y);
                        acc += seg;
                    } else {
                        const f = seg > 0 ? (vis - acc) / seg : 0;
                        g.lineTo(pts[i - 1].x + (pts[i].x - pts[i - 1].x) * f, pts[i - 1].y + (pts[i].y - pts[i - 1].y) *
                            f);
                        break;
                    }
                }
                g.stroke();
                g.restore();
                g.globalAlpha = fade;
                g.strokeStyle = s.color;
                g.lineWidth = s.w * (1 + beatP * 0.3);
                g.beginPath();
                g.moveTo(pts[0].x, pts[0].y);
                acc = 0;
                vis = k * total;
                for (let i = 1; i < pts.length; i++) {
                    const seg = lens[i - 1];
                    if (acc + seg <= vis) {
                        g.lineTo(pts[i].x, pts[i].y);
                        acc += seg;
                    } else {
                        const f = seg > 0 ? (vis - acc) / seg : 0;
                        g.lineTo(pts[i - 1].x + (pts[i].x - pts[i - 1].x) * f, pts[i - 1].y + (pts[i].y - pts[i - 1].y) *
                            f);
                        break;
                    }
                }
                g.stroke();
                g.fillStyle = COLORS.gray;
                g.beginPath();
                const lastX = pts[pts.length - 1].x,
                    lastY = pts[pts.length - 1].y;
                g.arc(lastX, lastY, s.w * (1.1 + beatP * 0.45), 0, 7);
                g.fill();
                g.restore();
            },
            pop(g, inst, t, fade) {
                inst.shapes.forEach((s, i) => {
                    const k = easeOutBack(Math.min(1, (t - s.delay) / 0.55));
                    if (k <= 0) return;
                    const y = s.y + Math.sin(t * 2 + i * 1.7) * 7;
                    const sz = s.size * k * (1 + beatP * 0.2);
                    g.globalAlpha = 0.96 * fade;
                    g.save();
                    g.translate(s.x, y);
                    g.rotate(s.rot + t * 0.4 * inst.dir + beatP * 0.08 * inst.dir);
                    g.fillStyle = s.color;
                    const r = sz;
                    switch (s.kind) {
                        case 'circle':
                            g.beginPath();
                            g.arc(0, 0, r, 0, 7);
                            g.fill();
                            break;
                        case 'square':
                            g.fillRect(-r, -r, r * 2, r * 2);
                            break;
                        case 'ring':
                            g.strokeStyle = s.color;
                            g.lineWidth = r * 0.2;
                            g.beginPath();
                            g.arc(0, 0, r, 0, 7);
                            g.stroke();
                            break;
                        case 'triangle':
                            g.beginPath();
                            for (let j = 0; j < 3; j++) {
                                const a = -Math.PI / 2 + (j * 2 * Math.PI) / 3;
                                const px = Math.cos(a) * r * 1.2,
                                    py = Math.sin(a) * r * 1.2;
                                j ? g.lineTo(px, py) : g.moveTo(px, py);
                            }
                            g.closePath();
                            g.fill();
                            break;
                        case 'hexagon':
                            g.beginPath();
                            for (let j = 0; j < 6; j++) {
                                const a = (j * 2 * Math.PI) / 6;
                                const px = Math.cos(a) * r * 1.1,
                                    py = Math.sin(a) * r * 1.1;
                                j ? g.lineTo(px, py) : g.moveTo(px, py);
                            }
                            g.closePath();
                            g.fill();
                            break;
                        default:
                            g.beginPath();
                            g.arc(0, 0, r, 0, 7);
                            g.fill();
                    }
                    g.restore();
                });
            },
            cross(g, inst, t, fade) {
                const s = inst.shapes[0];
                const k1 = easeOutBack(Math.min(1, t / 0.55));
                const k2 = easeOutBack(Math.min(1, (t - 0.13) / 0.55));
                if (k1 <= 0) return;
                g.save();
                g.translate(inst.cx, inst.cy);
                g.rotate(inst.rot0 + inst.dir * (1 - k1) * 1.6 + Math.sin(t * 1.3) * 0.07 + beatP * 0.02 * inst.dir);
                const pulse = 1 + beatP * 0.12;
                g.scale(pulse, pulse);
                const L = s.size / 2,
                    w = s.w / 2;
                g.globalAlpha = fade;
                g.fillStyle = s.color;
                g.fillRect(-L * k1, -w, L * 2 * k1, w * 2);
                if (k2 > 0) g.fillRect(-w, -L * k2, w * 2, L * 2 * k2);
                g.globalAlpha = 0.6 * fade;
                g.strokeStyle = COLORS.gray;
                g.lineWidth = Math.max(2, s.w * 0.28);
                g.beginPath();
                g.arc(0, 0, s.size * 0.68 * k1 * (1 + beatP * 0.08), 0, 7);
                g.stroke();
                g.restore();
            },
            orbit(g, inst, t, fade) {
                inst.shapes.forEach(s => {
                    const k = easeOutCubic(Math.min(1, (t - s.delay) / 0.55));
                    if (k <= 0) return;
                    const a = s.ang0 + t * s.speed + inst.dir * (1 - k) * 1.8;
                    const R = s.rad * k * (1 + beatP * 0.09);
                    const x = inst.cx + Math.cos(a) * R;
                    const y = inst.cy + Math.sin(a) * R;
                    g.globalAlpha = fade;
                    g.save();
                    g.translate(x, y);
                    g.rotate(t * 1.2 * inst.dir);
                    g.fillStyle = s.color;
                    const r = s.size * (0.6 + 0.4 * k) * (1 + beatP * 0.15);
                    switch (s.kind) {
                        case 'circle':
                            g.beginPath();
                            g.arc(0, 0, r, 0, 7);
                            g.fill();
                            break;
                        case 'square':
                            g.fillRect(-r, -r, r * 2, r * 2);
                            break;
                        case 'triangle':
                            g.beginPath();
                            for (let j = 0; j < 3; j++) {
                                const a2 = -Math.PI / 2 + (j * 2 * Math.PI) / 3;
                                const px = Math.cos(a2) * r * 1.2,
                                    py = Math.sin(a2) * r * 1.2;
                                j ? g.lineTo(px, py) : g.moveTo(px, py);
                            }
                            g.closePath();
                            g.fill();
                            break;
                        case 'ring':
                            g.strokeStyle = s.color;
                            g.lineWidth = r * 0.2;
                            g.beginPath();
                            g.arc(0, 0, r, 0, 7);
                            g.stroke();
                            break;
                        default:
                            g.beginPath();
                            g.arc(0, 0, r, 0, 7);
                            g.fill();
                    }
                    g.restore();
                });
                const ck = easeOutBack(Math.min(1, t / 0.55));
                if (ck > 0) {
                    g.globalAlpha = fade;
                    g.fillStyle = COLORS.amber;
                    g.beginPath();
                    g.arc(inst.cx, inst.cy, inst.coreR * ck * (1 + beatP * 0.2), 0, 7);
                    g.fill();
                }
            },
            wave(g, inst, t, fade) {
                const step = Math.max(14, fxW / 28);
                for (const s of inst.shapes) {
                    const k = easeOutCubic(Math.min(1, (t - s.delay) / 0.6));
                    if (k <= 0) continue;
                    const off = (1 - k) * (fxW + 120) * s.side;
                    const amp = s.amp * (0.6 + 0.4 * k) * (1 + beatP * 0.3);
                    g.globalAlpha = 0.9 * fade;
                    g.fillStyle = s.color;
                    g.beginPath();
                    for (let x = -60; x <= fxW + 60; x += step) {
                        const y = s.y0 + Math.sin((x / s.wl) * Math.PI * 2 + t * s.speed) * amp;
                        x === -60 ? g.moveTo(x + off, y) : g.lineTo(x + off, y);
                    }
                    for (let x = fxW + 60; x >= -60; x -= step) {
                        const y = s.y0 + s.th * (1 + beatP * 0.12) + Math.sin((x / s.wl) * Math.PI * 2 + t * s.speed +
                            0.9) * amp;
                        g.lineTo(x + off, y);
                    }
                    g.closePath();
                    g.fill();
                }
            },
            stars(g, inst, t, fade) {
                inst.shapes.forEach((s, i) => {
                    const k = easeOutElastic(Math.min(1, (t - s.delay) / 0.55));
                    if (k <= 0) return;
                    const tw = 1 + 0.15 * Math.sin(t * 3.2 + i * 2.1) + beatP * 0.18;
                    g.globalAlpha = 0.97 * fade;
                    g.save();
                    g.translate(s.x, s.y);
                    g.rotate(s.rot + t * 0.7 * inst.dir);
                    g.fillStyle = s.color;
                    const r = s.r * k * tw;
                    g.beginPath();
                    for (let j = 0; j < 10; j++) {
                        const a = -Math.PI / 2 + (j * 2 * Math.PI) / 10;
                        const rr = j % 2 ? r * 0.46 : r;
                        const px = Math.cos(a) * rr,
                            py = Math.sin(a) * rr;
                        j ? g.lineTo(px, py) : g.moveTo(px, py);
                    }
                    g.closePath();
                    g.fill();
                    g.restore();
                });
            },
            grid(g, inst, t, fade) {
                const s = inst.shapes[0];
                const R = s.radius * (1 + beatP * 0.06 + 0.03 * Math.sin(t * 1.3));
                g.save();
                g.translate(inst.cx, inst.cy);
                g.rotate(inst.rot0 + t * 0.22 * inst.dir + beatP * 0.025 * inst.dir);
                g.beginPath();
                g.arc(0, 0, R, 0, 7);
                g.clip();
                for (const ln of s.lines) {
                    const k = easeOutCubic(Math.min(1, (t - ln.delay) / 0.55));
                    if (k <= 0) continue;
                    g.globalAlpha = 0.92 * fade;
                    g.strokeStyle = ln.color;
                    g.lineWidth = ln.w * (1 + beatP * 0.35);
                    g.beginPath();
                    g.moveTo(-R * k, ln.y);
                    g.lineTo(R * k, ln.y);
                    g.stroke();
                }
                g.restore();
                const ok = easeOutBack(Math.min(1, t / 0.55));
                if (ok > 0) {
                    g.globalAlpha = fade;
                    g.strokeStyle = COLORS.amber;
                    g.lineWidth = 6 * (1 + beatP * 0.35);
                    g.beginPath();
                    g.arc(inst.cx, inst.cy, R * ok, 0, 7);
                    g.stroke();
                }
            }
        };

        function spawnEffect(col, row, when) {
            const type = EFFECTS[(col * ROWS + row) % EFFECTS.length];
            const now = nowSec();
            for (const e of fxList) { if (e.state !== 'out') { e.state = 'out';
                    e.outT0 = now; } }
            while (fxList.length > 6) fxList.shift();
            const inst = buildEffect(type);
            inst.t0 = Math.min(when, now + 0.05);
            fxList.push(inst);
        }

        function fxFrame(now) {
            fxCtx.clearRect(0, 0, fxW, fxH);
            for (let i = fxList.length - 1; i >= 0; i--) {
                const inst = fxList[i];
                let outK = 0;
                if (inst.state === 'out') {
                    outK = clamp01((now - inst.outT0) / 0.4);
                    if (outK >= 1) { fxList.splice(i, 1); continue; }
                }
                const t = now - inst.t0;
                if (t < 0) continue;
                const fade = 1 - smooth(outK);
                const sc = inst.state === 'out' ? 1 - 0.22 * outK : 1 + beatP * 0.02;
                fxCtx.save();
                fxCtx.translate(inst.cx, inst.cy);
                fxCtx.scale(sc, sc);
                fxCtx.translate(-inst.cx, -inst.cy);
                DRAW[inst.type](fxCtx, inst, t, fade);
                fxCtx.restore();
            }
        }

        // ---------- 画布尺寸 ----------
        function resizeFx() {
            const rect = document.getElementById('stage').getBoundingClientRect();
            const dpr = Math.min(devicePixelRatio || 1, 2);
            fxW = rect.width;
            fxH = rect.height;
            fxCanvas.width = Math.round(fxW * dpr);
            fxCanvas.height = Math.round(fxH * dpr);
            fxCanvas.style.width = fxW + 'px';
            fxCanvas.style.height = fxH + 'px';
            fxCtx.setTransform(dpr, 0, 0, dpr, 0, 0);
            for (const e of fxList) { e.cx = fxW / 2;
                e.cy = fxH / 2; }
        }

        // ---------- 网格构建 ----------
        function buildGrid() {
            gridEl = document.getElementById('grid');
            gridEl.style.gridTemplateColumns = `repeat(${COLS}, 1fr)`;
            gridEl.style.gridTemplateRows = `repeat(${ROWS}, 1fr)`;
            gridEl.innerHTML = '';
            cells = [];
            for (let r = 0; r < ROWS; r++) {
                for (let c = 0; c < COLS; c++) {
                    const cell = document.createElement('div');
                    cell.className = 'cell';
                    cell.dataset.col = c;
                    cell.dataset.row = r;
                    gridEl.appendChild(cell);
                    cells.push(cell);
                }
            }
        }

        // ---------- 动画循环 ----------
        function tick() {
            requestAnimationFrame(tick);
            const now = nowSec();
            const dt = Math.min(0.05, Math.max(0.001, now - lastTick));
            lastTick = now;

            if (started && ctx) {
                const t = ctx.currentTime;
                const phase = (((t - startTime) / SPB) % 1 + 1) % 1;
                beatP = Math.pow(1 - phase, 2.4);
                const horizon = t + INPUT_LOOKAHEAD;
                while (nextNoteTime < horizon) {
                    scheduleStep(stepCount, nextNoteTime);
                    nextNoteTime += S16;
                    stepCount = (stepCount + 1) % 64;
                }
                scheduleQueuedInputs(t + INPUT_QUEUE_LOOKAHEAD);
            }

            fxFrame(now);
        }

        // ---------- 交互事件 ----------
        function setupEvents() {
            const stage = document.getElementById('stage');

            stage.addEventListener('pointerdown', (e) => {
                e.preventDefault();
                if (!started) { return; } // 只有启动后才响应
                try { stage.setPointerCapture(e.pointerId); } catch (_) {}
                tryActivate(e.pointerId, e.clientX, e.clientY);
            });

            stage.addEventListener('pointermove', (e) => {
                if (!pointers.has(e.pointerId)) return;
                if (!started) return;
                e.preventDefault();
                tryActivate(e.pointerId, e.clientX, e.clientY);
            });

            stage.addEventListener('pointerup', (e) => {
                pointers.delete(e.pointerId);
                try { stage.releasePointerCapture(e.pointerId); } catch (_) {}
            });

            stage.addEventListener('pointercancel', (e) => {
                pointers.delete(e.pointerId);
                try { stage.releasePointerCapture(e.pointerId); } catch (_) {}
            });

            stage.addEventListener('contextmenu', (e) => e.preventDefault());

            window.addEventListener('blur', () => {
                // 不清除队列
            });
        }

        // ---------- 音量滑块 ----------
        function setupVolumeSlider() {
            const slider = document.getElementById('bgm-volume');
            const display = document.getElementById('vol-value');
            const control = document.getElementById('volume-control');

            slider.addEventListener('input', () => {
                const val = parseFloat(slider.value);
                bgmVolume = val;
                display.textContent = Math.round(val * 100) + '%';
                if (bgmBus) {
                    bgmBus.gain.setTargetAtTime(val, ctx.currentTime, 0.02);
                }
            });

            control.addEventListener('pointerdown', (e) => e.stopPropagation());
            control.addEventListener('pointerup', (e) => e.stopPropagation());
            control.addEventListener('click', (e) => e.stopPropagation());
        }

        // ---------- 加载并启动 ----------
        function beginLoad() {
            const hint = document.getElementById('start-hint');
            const trigger = document.getElementById('start-trigger');
            hint.textContent = '加载音频文件中...';
            hint.style.animation = 'none';
            trigger.style.cursor = 'default';
            trigger.style.pointerEvents = 'none';

            // 禁用音量控件
            const slider = document.getElementById('bgm-volume');
            const control = document.getElementById('volume-control');
            slider.disabled = true;
            control.classList.add('disabled');

            // 初始化音频上下文
            initAudio();
            if (ctx.state === 'suspended') ctx.resume();

            // 加载音效
            loadSamples().then(() => {
                // 加载完成，启动游戏
                startGame();
            }).catch(err => {
                console.warn('加载音效失败，仍继续', err);
                startGame();
            });
        }

        function startGame() {
            if (started) return;
            // 移除遮罩
            const overlay = document.getElementById('overlay');
            if (overlay) overlay.remove();

            // 启动时间线
            startTime = ctx.currentTime + 0.12;
            nextNoteTime = startTime;
            lastCommittedInputTime = -Infinity;
            inputQueue.length = 0;
            stepCount = 0;
            started = true;
            console.log('游戏已启动');
            // 触发初始特效
            spawnEffect(0, 0, ctx.currentTime + 0.05);
        }

        // ---------- 初始化 ----------
        function init() {
            fxCanvas = document.getElementById('fx');
            fxCtx = fxCanvas.getContext('2d');
            buildGrid();
            resizeFx();
            setupEvents();
            setupVolumeSlider();

            // 遮罩点击触发加载
            const overlay = document.getElementById('overlay');
            overlay.addEventListener('click', (e) => {
                const target = e.target;
                if (target.closest('a') || target.closest('.volume-control')) return;
                if (started) return;
                beginLoad();
            });
            overlay.addEventListener('touchstart', (e) => {
                const target = e.target;
                if (target.closest('a') || target.closest('.volume-control')) return;
                e.preventDefault();
                if (started) return;
                beginLoad();
            }, { passive: false });

            // 链接阻止冒泡
            overlay.querySelectorAll('a').forEach(link => {
                link.addEventListener('click', (e) => e.stopPropagation());
                link.addEventListener('touchstart', (e) => e.stopPropagation());
            });

            window.addEventListener('resize', resizeFx);
            requestAnimationFrame(tick);

            // 预热音频
            document.addEventListener('click', () => {
                if (!ctx) initAudio();
            }, { once: true });

            console.log('拉伸Tap 已加载 (行数6，轨道顺序 boom,sla,sl,a)');
        }

        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', init);
        } else {
            init();
        }
    </script>
</body>
